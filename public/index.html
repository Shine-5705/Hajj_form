<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hajj Form Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
          radial-gradient(1200px 500px at 20% 0%, #dbeafe 0%, transparent 60%),
          radial-gradient(1000px 500px at 80% 100%, #ede9fe 0%, transparent 60%),
          #f8fafc;
      }

      .chat-shell {
        width: min(860px, 95vw);
        height: min(840px, 94vh);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        backdrop-filter: blur(6px);
      }

      .header {
        padding: 18px 24px;
        border-bottom: 1px solid #e5e7eb;
        font-weight: 700;
        color: #0f172a;
        font-size: 18px;
        background: linear-gradient(90deg, #eef2ff 0%, #f8fafc 100%);
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        background: #f8fafc;
      }

      .bubble {
        max-width: 80%;
        margin: 10px 0;
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        font-size: 14.5px;
      }

      .bot {
        background: linear-gradient(180deg, #eef2ff 0%, #e0e7ff 100%);
        color: #1e1b4b;
        border-top-left-radius: 4px;
      }

      .user {
        margin-left: auto;
        background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
        color: #14532d;
        border-top-right-radius: 4px;
      }

      .summary-card {
        margin-top: 8px;
        border-radius: 14px;
        border: 1px solid #c7d2fe;
        background: #ffffff;
        overflow: hidden;
      }

      .summary-title {
        padding: 10px 12px;
        background: #eef2ff;
        color: #312e81;
        font-weight: 700;
        font-size: 13px;
      }

      .summary-table {
        width: 100%;
        border-collapse: collapse;
      }

      .summary-table td {
        padding: 8px 12px;
        border-top: 1px solid #e5e7eb;
        vertical-align: top;
        font-size: 13px;
      }

      .summary-label {
        color: #475569;
        width: 44%;
        font-weight: 600;
      }

      .summary-value {
        color: #0f172a;
      }

      .composer {
        display: flex;
        gap: 10px;
        border-top: 1px solid #e5e7eb;
        padding: 12px;
        background: #ffffff;
      }

      input[type="text"] {
        flex: 1;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 11px 13px;
        font-size: 15px;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 11px 16px;
        background: linear-gradient(180deg, #4f46e5 0%, #4338ca 100%);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .meta {
        font-size: 12px;
        color: #64748b;
        padding: 0 14px 10px;
      }
    </style>
  </head>
  <body>
    <div class="chat-shell">
      <div class="header">Hajj Information Chat</div>
      <div id="messages" class="messages"></div>
      <div class="meta" id="meta">Starting chat...</div>
      <form id="chatForm" class="composer">
        <input
          id="messageInput"
          type="text"
          placeholder="Type your answer here"
          autocomplete="off"
          required
        />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const metaEl = document.getElementById("meta");
      const formEl = document.getElementById("chatForm");
      const inputEl = document.getElementById("messageInput");
      const sendBtnEl = document.getElementById("sendBtn");

      let sessionId = "";
      let completed = false;
      const FIELD_LABELS = {
        passportNumber: "Passport Number",
        placeOfIssue: "Place of Issue",
        dateOfIssue: "Date of Issue",
        dateOfExpiry: "Date of Expiry",
        dateOfBirth: "Date of Birth",
        placeOfBirth: "Place of Birth",
        surname: "Surname",
        givenName: "Given Name",
        fathersName: "Father's Name",
        mothersName: "Mother's Name",
        spousesName: "Spouse's Name",
        gender: "Gender",
        maritalStatus: "Marital Status",
        bloodGroup: "Blood Group",
        education: "Educational Qualification",
        occupation: "Occupation",
        aadhaarNumber: "Aadhaar Number",
        panNumber: "PAN Number",
      };

      function appendBubble(text, role) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendSummary(answers, submissionId) {
        const wrapper = document.createElement("div");
        wrapper.className = "bubble bot";
        wrapper.textContent = "Here is what you submitted:";

        const card = document.createElement("div");
        card.className = "summary-card";

        const title = document.createElement("div");
        title.className = "summary-title";
        title.textContent = submissionId
          ? `Submission ID: ${submissionId}`
          : "Submission Details";
        card.appendChild(title);

        const table = document.createElement("table");
        table.className = "summary-table";

        Object.entries(answers || {}).forEach(([key, value]) => {
          const tr = document.createElement("tr");
          const tdLabel = document.createElement("td");
          tdLabel.className = "summary-label";
          tdLabel.textContent = FIELD_LABELS[key] || key;

          const tdValue = document.createElement("td");
          tdValue.className = "summary-value";
          tdValue.textContent = value || "-";

          tr.appendChild(tdLabel);
          tr.appendChild(tdValue);
          table.appendChild(tr);
        });

        card.appendChild(table);
        wrapper.appendChild(card);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setBusy(isBusy) {
        inputEl.disabled = isBusy || completed;
        sendBtnEl.disabled = isBusy || completed;
      }

      async function startChat() {
        setBusy(true);
        metaEl.textContent = "Connecting...";
        try {
          const res = await fetch("/webchat/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          const data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error(data.error || "Unable to start chat.");
          }
          sessionId = data.sessionId;
          appendBubble(`Hi!\n\n${data.reply}`, "bot");
          metaEl.textContent = "Conversation started";
          setBusy(false);
          inputEl.focus();
        } catch (error) {
          appendBubble("Failed to start chat. Please refresh and try again.", "bot");
          metaEl.textContent = error.message;
        }
      }

      async function sendMessage(message) {
        setBusy(true);
        try {
          const res = await fetch("/webchat/message", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId, message }),
          });
          const data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error(data.error || "Message failed.");
          }

          appendBubble(data.reply, "bot");
          metaEl.textContent = `Stage: ${data.stage}`;

          if (data.stage === "completed") {
            completed = true;
            appendSummary(data.answers, data.submissionId);
            setBusy(false);
            inputEl.placeholder = "Form completed";
            return;
          }
          setBusy(false);
          inputEl.focus();
        } catch (error) {
          appendBubble("Something went wrong. Please try again.", "bot");
          metaEl.textContent = error.message;
          setBusy(false);
        }
      }

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (completed) {
          return;
        }

        const message = inputEl.value.trim();
        if (!message) {
          return;
        }

        appendBubble(message, "user");
        inputEl.value = "";
        await sendMessage(message);
      });

      startChat();
    </script>
  </body>
</html>
